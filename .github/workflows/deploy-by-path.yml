name: Deploy By Path

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/deploy-by-path.yml
  workflow_dispatch:

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy_backend_railway:
    needs: detect_changes
    if: needs.detect_changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway deploy hook
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [[ -z "$RAILWAY_DEPLOY_HOOK_URL" ]]; then
            echo "Missing GitHub secret: RAILWAY_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"

  deploy_frontend_netlify:
    needs: detect_changes
    if: needs.detect_changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build hook
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [[ -z "$NETLIFY_BUILD_HOOK_URL" ]]; then
            echo "Missing GitHub secret: NETLIFY_BUILD_HOOK_URL"
            exit 1
          fi

          curl -fsSL -X POST "$NETLIFY_BUILD_HOOK_URL"
